    <!-- GitHub Pages SPA redirect handler (works with 404.html) -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location))
    </script>

    <!-- ══════ CLIENT-SIDE SEO: inject live BTC price into <title> and meta ══════ -->
    <script>
    (function() {
      var orig = document.title;
      function up() {
        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
          .then(function(r){return r.json()})
          .then(function(d){
            var p = parseFloat(d.price).toLocaleString('en-US',{style:'currency',currency:'USD'});
            document.title = 'Bitcoin Price Today ' + p + ' | BTC to USD Live – btctoon.com';
            var dm = document.querySelector('meta[name="description"]');
            if(dm) dm.setAttribute('content','Bitcoin price today is '+p+'. Live BTC/USDT real-time price, 24h volume, and animated bulls vs bears battleground on btctoon.com. Updated every second.');
            // Update LD+JSON price
            var ld = document.getElementById('crypto-price-ld');
            if(ld) {
              try {
                var j = JSON.parse(ld.textContent);
                j.currentExchangeRate.price = d.price;
                ld.textContent = JSON.stringify(j);
              } catch(e){}
            }
          }).catch(function(){});
      }
      up();
      setInterval(up, 30000); // refresh every 30s
    })();
    </script>
